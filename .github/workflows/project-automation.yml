name: Project Board & Issue Automation

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened]

jobs:
  automate-project:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Add Issue or PR to the Project Board
      # Note: This uses actions/add-to-project which requires a Personal Access Token (PAT) 
      # with 'project' scope saved in secrets.PROJECT_PAT.
      - name: Add to Project Board
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/users/alitonia/projects/5
          github-token: ${{ secrets.PROJECT_PAT || secrets.GITHUB_TOKEN }}

      # Step 2: Auto-label and Auto-assign issues based on title prefixes
      - name: Auto-Label & Auto-Assign Issues
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          echo "Processing issue #$ISSUE_NUMBER: '$ISSUE_TITLE'"
          
          # Only process issues that start with "Task "
          if [[ ! "$ISSUE_TITLE" =~ ^Task\  ]]; then
            echo "Not a task issue. Skipping."
            exit 0
          fi

          LABELS=()
          ASSIGNEES=()

          # Helper function to check prefix
          has_prefix() {
            [[ "$ISSUE_TITLE" =~ ^$1 ]]
          }

          # Mappings for Role Labels
          if has_prefix "Task 1.0" || has_prefix "Task 1.1" || has_prefix "Task 1.4" || has_prefix "Task 3.4" || has_prefix "Task 7.2" || has_prefix "Task 8.2" || has_prefix "Task 8.3" || has_prefix "Task 8.4"; then
            LABELS+=("role:planner")
          fi

          if has_prefix "Task 1.0" || has_prefix "Task 1.2" || has_prefix "Task 1.3" || has_prefix "Task 1.4" || has_prefix "Task 1.5" || has_prefix "Task 3.1" || has_prefix "Task 3.2" || has_prefix "Task 3.3" || has_prefix "Task 3.4"; then
            LABELS+=("role:data-engineer")
          fi

          if has_prefix "Task 1.1" || has_prefix "Task 1.5" || has_prefix "Task 2.1" || has_prefix "Task 2.2" || has_prefix "Task 2.3" || has_prefix "Task 8.1" || has_prefix "Task 8.2" || has_prefix "Task 8.3"; then
            LABELS+=("role:data-analyst")
          fi

          if has_prefix "Task 4.1" || has_prefix "Task 4.2" || has_prefix "Task 4.3" || has_prefix "Task 4.4" || has_prefix "Task 5.2" || has_prefix "Task 5.3"; then
            LABELS+=("role:ml-modeling")
          fi

          if has_prefix "Task 5.1" || has_prefix "Task 5.4" || has_prefix "Task 5.5"; then
            LABELS+=("role:ml-evaluation")
          fi

          if has_prefix "Task 6.1" || has_prefix "Task 6.2" || has_prefix "Task 6.3" || has_prefix "Task 6.4" || has_prefix "Task 7.1" || has_prefix "Task 7.2" || has_prefix "Task 8.4"; then
            LABELS+=("role:mlops")
          fi

          # Mappings for Assignments
          # Assign to alitonia if it's a Planner or ML Modeling task
          if [[ " ${LABELS[@]} " =~ " role:planner " || " ${LABELS[@]} " =~ " role:ml-modeling " ]]; then
            ASSIGNEES+=("alitonia")
          fi

          # Apply Labels
          if [ ${#LABELS[@]} -ne 0 ]; then
            LABEL_ARGS=""
            for lbl in "${LABELS[@]}"; do
              LABEL_ARGS="$LABEL_ARGS --add-label \"$lbl\""
            done
            echo "Applying labels: ${LABELS[*]}"
            eval "gh issue edit $ISSUE_NUMBER $LABEL_ARGS"
          fi

          # Apply Assignees
          if [ ${#ASSIGNEES[@]} -ne 0 ]; then
            ASSIGNEE_ARGS=""
            for ass in "${ASSIGNEES[@]}"; do
              ASSIGNEE_ARGS="$ASSIGNEE_ARGS --add-assignee \"$ass\""
            done
            echo "Assigning: ${ASSIGNEES[*]}"
            eval "gh issue edit $ISSUE_NUMBER $ASSIGNEE_ARGS"
          fi
